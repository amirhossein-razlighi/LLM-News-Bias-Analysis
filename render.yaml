services:
  - type: web
    name: sourcerers-analytics-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.engine_analytics:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ENABLE_ANALYTICS_WRITE_ENDPOINTS
        value: "0"
      - key: API_ALLOW_ORIGINS
        value: "*"